name: Build Mikasa APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip source
        run: |
          unzip MikasaAssistant.zip
          ls MikasaAssistant/

      - name: Install Gradle + create wrapper
        working-directory: MikasaAssistant
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip
          unzip -q gradle-8.6-bin.zip
          gradle-8.6/bin/gradle wrapper --gradle-version 8.6
          chmod +x gradlew

      - name: Build APK
        working-directory: MikasaAssistant
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - uses: actions/upload-artifact@v4
        with:
          name: Mikasa-APK
          path: MikasaAssistant/app/build/outputs/apk/debug/app-debug.apk
