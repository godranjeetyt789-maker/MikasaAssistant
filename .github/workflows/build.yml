name: Build Mikasa APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Extract ZIP
        run: unzip MikasaAssistant.zip
      - name: Build APK
        working-directory: MikasaAssistant
        run: chmod +x gradlew && ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mikasa-APK
          path: MikasaAssistant/app/build/outputs/apk/debug/app-debug.apk
