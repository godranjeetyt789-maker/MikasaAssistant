name: Build Mikasa APK
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Unzip source
        run: unzip MikasaAssistant.zip

      - name: Make gradlew executable
        working-directory: MikasaAssistant
        run: chmod +x gradlew

      - name: Build Debug APK
        working-directory: MikasaAssistant
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Mikasa-APK
          path: MikasaAssistant/app/build/outputs/apk/debug/app-debug.apk
